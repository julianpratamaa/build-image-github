name: Build and Push Image

on:
  push:

jobs:
  build-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: docker build -t imageku .

      - name: Login GHCR
        run: echo ${{ secrets.TOKEN_GITHUB }} | docker login ghcr.io -u julianpratamaa --password-stdin

      - name: Tag
        run: docker tag imageku ghcr.io/julianpratamaa/imageku:latest

      - name: Push
        run: docker push ghcr.io/julianpratamaa/imageku:latest
